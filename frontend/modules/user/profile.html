<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Food Ordering System</title>
    
    <script src="../../common/js/config.js"></script>
    <script src="../../common/js/tailwind-theme.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Common JS Files -->
    <script src="../../common/js/api.js"></script>
    <script src="../../common/js/auth.js"></script>
    <script src="../../common/js/utils.js"></script>
    <script src="../../common/js/navbar.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Common CSS -->
    <link rel="stylesheet" href="../../common/css/common.css">

    <!-- Tailwind theme loaded from common/tailwind-theme.js -->
</head>
<body class="bg-gray-100">
    <!-- Common Navigation Bar (unified style) -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="#" id="navbar-brand-link" class="navbar-brand">
                <i class="fas fa-utensils"></i>
                Food Ordering System
            </a>

            <ul class="navbar-menu" id="navbar-menu">
                <!-- Guest Menu -->
                <li id="nav-guest" style="display: none;">
                    <a href="#" id="nav-home-link" class="navbar-link">
                        <i class="fas fa-home"></i> Home
                    </a>
                </li>
                
                <!-- User Menu -->
                <li id="nav-user-dashboard" style="display: none;">
                    <a href="#" id="nav-user-dashboard-link" class="navbar-link">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </li>
                <li id="nav-user-order" style="display: none;">
                    <a href="#" id="nav-user-order-link" class="navbar-link">
                        <i class="fas fa-shopping-cart"></i> Order Food
                    </a>
                </li>
                <li id="nav-user-history" style="display: none;">
                    <a href="#" id="nav-user-history-link" class="navbar-link">
                        <i class="fas fa-history"></i> Order History
                    </a>
                </li>
                <li id="nav-user-profile" style="display: none;">
                    <a href="#" id="nav-user-profile-link" class="navbar-link">
                        <i class="fas fa-user"></i> My Profile
                    </a>
                </li>

                <!-- Admin Menu -->
                <li id="nav-admin-dashboard" style="display: none;">
                    <a href="#" id="nav-admin-dashboard-link" class="navbar-link">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </li>
                <li id="nav-admin-menu" style="display: none;">
                    <a href="#" id="nav-admin-menu-link" class="navbar-link">
                        <i class="fas fa-utensils"></i> Menu Management
                    </a>
                </li>

                <!-- User Info & Actions -->
                <li>
                    <div class="navbar-user-info" id="navbar-user-info" style="display: none;">
                        <i class="fas fa-user-circle"></i>
                        <span id="navbar-username"></span>
                    </div>
                </li>
                <li id="nav-login" style="display: none;">
                    <button class="navbar-button" onclick="navLogin()">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </li>
                <li id="nav-logout" style="display: none;">
                    <button class="navbar-button" onclick="navLogout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Profile Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <span>👤</span> Profile Information
            </h2>
            
            <form id="profile-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Username</label>
                        <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" readonly>
                        <p class="text-sm text-gray-500 mt-1">Username cannot be changed</p>
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Email</label>
                        <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-700 font-semibold mb-2">Phone</label>
                        <input type="tel" id="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Address</label>
                    <textarea id="address" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                </div>

                <div class="flex justify-end">
                    <button type="submit" class="text-white px-6 py-3 rounded-lg font-semibold hover:bg-opacity-90 transition-all" style="background-color: var(--color-primary);">
                        💾 Save Changes
                    </button>
                </div>
            </form>
        </div>

        <!-- Change Password Section -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <span>🔒</span> Change Password
            </h2>
            
            <form id="password-form" class="space-y-4">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Current Password</label>
                    <input type="password" id="current-password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">New Password</label>
                    <input type="password" id="new-password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required minlength="6">
                    <p class="text-sm text-gray-500 mt-1">Minimum 6 characters</p>
                </div>

                <div>
                    <label class="block text-gray-700 font-semibold mb-2">Confirm New Password</label>
                    <input type="password" id="confirm-password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" required minlength="6">
                </div>

                <div class="flex justify-end">
                    <button type="submit" class="text-white px-8 py-3 rounded-lg font-semibold hover:opacity-90 transition-all" style="background-color: var(--color-primary); box-shadow: 0 2px 8px rgba(0,0,0,0.15);">
                        🔑 Update Password
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', async () => {
            // Check if user is logged in
            if (!isLoggedIn()) {
                window.location.href = '../auth/login.html';
                return;
            }

            // Get current user
            currentUser = getCurrentUser();
            
            // Load profile data
            await loadProfile();
        });

        // Load user profile
        async function loadProfile() {
            try {
                showLoading('Loading profile...');

                const response = await apiGet(API_ENDPOINTS.USER_PROFILE);

                hideLoading();

                // The response has a 'user' object
                const user = response.user || response;

                // Populate form fields
                document.getElementById('username').value = user.username || currentUser.userName;
                document.getElementById('email').value = user.email || '';
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('address').value = user.address || '';

            } catch (error) {
                hideLoading();
                console.error('Error loading profile:', error);
                // If API fails, just show username from localStorage
                document.getElementById('username').value = currentUser.userName;
            }
        }

        // Handle profile form submission
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            try {
                showLoading('Updating profile...');

                const profileData = {
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value
                };

                // Use PUT method for updating profile
                await apiPut(API_ENDPOINTS.USER_PROFILE, profileData);

                hideLoading();

                await showSuccess('Success!', 'Profile updated successfully');

            } catch (error) {
                hideLoading();
                handleApiError(error, 'Failed to update profile');
            }
        });

        // Handle password form submission
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                await showError('Error', 'New passwords do not match');
                return;
            }

            // Validate password length
            if (newPassword.length < 6) {
                await showError('Error', 'Password must be at least 6 characters');
                return;
            }

            try {
                showLoading('Updating password...');

                const passwordData = {
                    current_password: currentPassword,
                    new_password: newPassword
                };

                await apiPost(`${API_ENDPOINTS.USER_PROFILE}/change-password`, passwordData);

                hideLoading();

                // Clear form
                document.getElementById('password-form').reset();

                await showSuccess('Success!', 'Password updated successfully');

            } catch (error) {
                hideLoading();
                handleApiError(error, 'Failed to update password');
            }
        });

        // Use global confirmation
        function logout() { return confirmLogout(); }
    </script>
</body>
</html>
